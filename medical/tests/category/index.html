<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тесты Рентгенолаборанта</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Экран выбора серии -->
        <div id="startScreen" class="screen active">
            <h1>Тесты Рентгенолаборанта</h1>
            
            <div class="start-button-container">
                <button class="start-test-btn" id="startTestBtn">Начать тестирование</button>
            </div>

            <div class="stats-summary">
                <h3>Общая статистика</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="totalQuestions">0</span>
                        <span class="stat-label">Всего вопросов</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="totalCorrect">0</span>
                        <span class="stat-label">Правильных</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="totalAccuracy">0%</span>
                        <span class="stat-label">Точность</span>
                    </div>
                </div>
            </div>

            <button class="secondary-btn" id="showStatsBtn">Подробная статистика</button>
            <button class="secondary-btn" id="resetProgressBtn">Сбросить прогресс</button>
        </div>

        <!-- Экран теста -->
        <div id="testScreen" class="screen">
            <div class="header">
                <div class="progress-info">
                    Вопрос <span id="currentQuestion">1</span>
                </div>
                <div class="session-stats">
                    <span class="correct-count" id="sessionCorrect">0</span><span class="stats-separator">/</span><span class="incorrect-count" id="sessionIncorrect">0</span>
                </div>
                <button class="icon-btn" id="exitTestBtn" title="Закончить тест">✕</button>
            </div>

            <div class="question-container">
                <h2 id="questionText"></h2>
                <div id="answersContainer" class="answers-container"></div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button id="submitBtn" class="primary-btn">Проверить</button>
                <button id="nextBtn" class="primary-btn" style="display: none;">Следующий вопрос</button>
            </div>
        </div>

        <!-- Экран статистики -->
        <div id="statsScreen" class="screen">
            <div class="stats-header">
                <h1>Подробная статистика</h1>
                <button class="icon-btn" id="closeStatsBtn">✕</button>
            </div>

            <div class="stats-overview">
                <div class="stat-card">
                    <div class="stat-card-value" id="statsTotal">0</div>
                    <div class="stat-card-label">Всего ответов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="statsCorrect">0</div>
                    <div class="stat-card-label">Правильных</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="statsAccuracy">0%</div>
                    <div class="stat-card-label">Точность</div>
                </div>
            </div>

            <h3>Сложные вопросы</h3>
            <div id="difficultQuestions" class="difficult-questions"></div>
        </div>

        <!-- Кнопка смены темы -->
        <button class="theme-toggle" id="themeToggle" title="Сменить тему">
            <span class="theme-icon">🌙</span>
        </button>
    </div>

    <!-- Опционально: если используете внешний файл с вопросами -->
    <!-- Раскомментируйте следующую строку после запуска python txt_to_js.py -->
    <!-- <script src="questionsData.js"></script> -->
    
    <script src="app.js"></script>
</body>
</html>
